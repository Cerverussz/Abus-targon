name: Targon stock check

on:
  schedule:
    # 13:00, 19:00 y 01:00 UTC  (≈ 8:00 a.m., 2:00 p.m. y 8:00 p.m. hora Colombia)
    - cron: "0 13,19,1 * * *"
  workflow_dispatch: {}  # permite lanzar una corrida manual desde la pestaña Actions

permissions:
  contents: write  # necesario para commitear state.json de vuelta a la rama

concurrency:
  group: targon-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Para tiendas con method: scraper (LordGun/Abus). Si no se define
          # el secret, esas tiendas quedan en ERROR y el resto sigue igual.
          SCRAPER_PROVIDER: ${{ secrets.SCRAPER_PROVIDER }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python -m src.checker

      - name: Persist state.json
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update stock state [skip ci]"
            git push
          else
            echo "Sin cambios en state.json; nada que commitear."
          fi
